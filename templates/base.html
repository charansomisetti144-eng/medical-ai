<!DOCTYPE html>
<html>

<head>
    <title>{% block title %}Medical AI{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div class="dashboard-container">
        <div class="language-switcher">
            <select id="language-select" onchange="setLanguage(this.value)">
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="te">Telugu</option>
            </select>
        </div>
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <h2 id="chatbot-title" class="logo">
                Medical AI<br>
                <span class="small-logo">web app</span>
            </h2>

            <nav class="sidebar-links">

                <a id="nav-home" href="/dashboard" class="{% if active_page == 'dashboard' %}active{% endif %}">
                    Home
                </a>

                <a id="nav-appointments" href="/appointments"
                    class="{% if active_page == 'appointments' %}active{% endif %}">
                    Appointments
                </a>

                <a id="nav-report-analysis" href="/medical-report"
                    class="{% if active_page == 'medical-report' %}active{% endif %}">
                    Medical Reports
                </a>

                <a id="nav-reports" href="/report-history"
                    class="{% if active_page == 'report-history' %}active{% endif %}">
                    Reports
                </a>

                <a id="nav-ai-chat" href="/ai-chat" class="{% if active_page == 'ai-chat' %}active{% endif %}">
                    AI Chat
                </a>

                <a id="nav-profile" href="/profile" class="{% if active_page == 'profile' %}active{% endif %}">
                    Profile
                </a>

                <a id="nav-logout" href="/logout" class="logout-btn">
                    Logout
                </a>

            </nav>
        </div>

        <!-- PAGE CONTENT -->
        <div class="main-content">
            {% block content %}{% endblock %}
        </div>

    </div>

        function updateText(id, value) {
            const el = document.getElementById(id);
            if (el) {
                el.innerText = value;
            }
        }

        function setLanguage(lang) {

            const popup = document.getElementById("language-popup");
            if (popup) popup.style.display = "none";

            updateText("welcome-text", translations[lang].welcome + " {{ username }} 👋");
            updateText("dashboard-desc", translations[lang].dashboardDesc);

            updateText("nav-home", translations[lang].home);
            updateText("nav-appointments", translations[lang].appointments);
            updateText("nav-report-analysis", translations[lang].medicalreport);
            updateText("nav-reports", translations[lang].reports);
            updateText("nav-ai-chat", translations[lang].aichat);
            updateText("nav-profile", translations[lang].profile);
            updateText("nav-logout", translations[lang].logout);

            updateText("card-appointments", translations[lang].cardAppointments);
            updateText("card-reports", translations[lang].cardReports);
            updateText("card-chat", translations[lang].cardChat);

            updateText("card-desc-appointments", translations[lang].cardDescAppointments);
            updateText("card-desc-reports", translations[lang].cardDescReports);
            updateText("card-desc-chat", translations[lang].cardDescChat);

            updateText("chatbot-title", translations[lang].chatbot);
            updateText("home-desc-1", translations[lang].homeDesc1);
            updateText("home-desc-2", translations[lang].homeDesc2);

            updateText("highlight-1", translations[lang].highlight1);
            updateText("highlight-2", translations[lang].highlight2);
            updateText("highlight-3", translations[lang].highlight3);
            updateText("highlight-4", translations[lang].highlight4);
            updateText("appointment-title", translations[lang].appointmentTitle);
            updateText("appointment-subtitle", translations[lang].appointmentSubtitle);
            updateText("search-btn", translations[lang].searchBtn);
            updateText("gps-btn", translations[lang].gpsBtn);

            updateText("report-title", translations[lang].reportTitle);
            updateText("report-subtitle", translations[lang].reportSubtitle);
            updateText("analyze-btn", translations[lang].analyzeBtn);
            updateText("download-report-btn", translations[lang].downloadReportBtn);

            updateText("history-title", translations[lang].historyTitle);
            updateText("history-subtitle", translations[lang].historySubtitle);
            updateText("no-reports-text", translations[lang].noReports);

            updateText("chat-title", translations[lang].chatTitle);
            updateText("chat-back", translations[lang].chatBack);
            updateText("chat-send-btn", translations[lang].chatSend);
            updateText("chat-download-btn", translations[lang].chatDownload);
            updateText("chat-welcome", translations[lang].chatWelcome);

            const userInput = document.getElementById("user-input");
            if (userInput) userInput.placeholder = translations[lang].chatPlaceholder;

            const symptomInput = document.getElementById("symptom-search");
            if (symptomInput) symptomInput.placeholder = translations[lang].symptomPlaceholder;

            fetch("/set_language", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ language: lang })
            });
        }
        document.addEventListener("DOMContentLoaded", function () {

            fetch("/get-language")
                .then(response => response.json())
                .then(data => {

                    const lang = data.language || "en";

                    document.getElementById("language-select").value = lang;

                    setLanguage(lang);
                });
        });
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("show");
        }
    </script>
</body>

</html>
